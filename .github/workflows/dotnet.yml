name: .NET CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore "./CICD Web Api/CICD Web Api.csproj"

    - name: Build
      run: dotnet build "./CICD Web Api/CICD Web Api.csproj" --no-restore --configuration Release

    - name: Test
      run: dotnet test "./CICD Web Api/CICD Web Api.csproj" --no-build
